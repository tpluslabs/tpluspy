name: Publish Python Package

on:
  release:
    types: [released]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    # Trusted Publishing (OIDC) — no stored secrets. PyPI verifies the request
    # came from this repo's publish.yml via a short-lived OIDC token.
    # Requires a matching "trusted publisher" configured on PyPI for the
    # tpluspy project (Manage project -> Publishing).
    environment:
      name: pypi
      url: https://pypi.org/project/tpluspy/
    permissions:
      id-token: write  # mandatory for OIDC; nothing else is needed

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
